<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style-caixa-paciente.css">
</head>
<body>
    <section id="tabela-paciente">
        <!--SE USUARIO FOR RESPONSAVEL TERÁ BOTÃO "Adicionar paciente" -->
        <!--SE USUARIO FOR CUIDADOR TERÁ BOTÃO "Conectar-se a paciente" -->

        <div id="sobre-paciente">
            <div id="foto-paciente">
                <img src="" alt="Foto do/a paciente">
            </div>
            <div>
                <div id="mostrar-nome-paciente">
                    <!--NOME PACIENTE-->
                </div>
                <div id="mostrar-idade-paciente">
                    <!--IDADE E DATA NASCIMENTO-->
                </div>
                <div id="mostrar-doenca-paciente">
                    <!--CAIXA COLORIDA COM DOENÇA IMPORTANTE DO PACIENTE-->
                </div>

            </div>
        </div>

        <div id="qual-cuidador">
            <div>
                <div>
                    <h4>Cuidador responsável</h4>
                </div>
                <div>
                    <div id="foto-cuidador">
                        <img src="" alt="Foto do/a cuidador">
                    </div>
                    <div>
                        <div id="mostrar-nome-cuidador">
                            <!--NOME CUIDADOR-->
                        </div>
                        <div id="mostrar-numero-cuidador">
                            <!--NUMERO DE TELEFONE-->
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <a href="">Ver perfil do/a cuidador</a>
            </div>
        </div>

        <div id="lista-de-remedios">
            <div>
                <div>
                    <h4>Medicamentos</h4>
                </div>
                <div id="mostrar-quantidade-remedios">
                    <!--QUANTIDADE TOTAL DE REMEDIOS-->
                </div>
                <div id="mostrar-lista-remedios">
                    <a href="">Ver lista completa</a>
                </div>
            </div>
        </div>

        <div id="relatorios">
            <div>
                <h4>Relatórios</h4>
            </div>
            <div id="mostrar-data-ultimo-relatorio">
                <!--DATA DO ULTIMO RELATORIO-->
            </div>
            <div id="mostrar-relatorios">
                <a href="">Ver relatórios</a>
            </div>
        </div>

        
        <div id="funcionalidades">
            <div>
                <div id="perfil-paciente">
                    <div id="foto-paciente">
                        <img src="" alt="Foto do paciente">
                    </div>
        
                    <div id="mostrar-perfil-paciente">
                        <a href="">Ver perfil completo do paciente</a>
                    </div>
                </div>
            </div>
            
            <div>
                <div>
                    <div id="editar">
                        <p>Editar</p>
                    </div>
                </div>
    
                <div>
                    <div id="remover">
                        <p>Remover</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
