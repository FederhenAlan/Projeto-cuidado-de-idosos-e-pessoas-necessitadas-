<section>
  <div>
    <form>
      <fieldset>
        <legend>Cadastro do paciente</legend>
        <label for="nome-paciente">Nome do paciente:</label>
        <input type="text" name="nome-paciente" id="nome-paciente">
        <br>

        <label for="data-nascimento-paciente">Qual a data de nascimento:</label>
        <input type="date" name="data-nascimento-paciente" id="data-nascimento-paciente">
        <br>

        <label for="peso">Peso (kg)</label>
        <input type="number" id="peso" name="peso" step="0.1" placeholder="80kg"/>
        <br/>
        
        <label for="altura">Altura (cm)</label>
        <input type="number" id="altura" name="altura" placeholder="180 centímetros"/>
        <br/>

        <label for="tipo-sanguineo">Tipo-sanguíneo:</label>
        <select name="tipo-sanguineo" id="tipo-sanguineo">
          <option value="a+">A+</option>
          <option value="a-">A-</option>
          <option value="b+">B+</option>
          <option value="b-">B-</option>
          <option value="ab+">AB+</option>
          <option value="ab-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
        <br/>

        <label for="nivel-de-dependencia">Nível de dependência</label>
        <select name="nivel-de-dependencia" id="nivel-de-dependencia">
          <option value="independente">Independente</option>
          <option value="parcialmente_dependente">Parcialmente dependente</option>
          <option value="totalmente_dependente">Totalmente dependente</option>
        </select>
        <br/>
